# Mode
Mode=Preedit
# Input Method
InputMethod=Telex
# Output Charset
OutputCharset=Unicode
# Type w to Produce ư
W2U=Disabled
# Type [ -> ơ, ] -> ư, { -> Ơ, } -> Ư
BracketTransform=Disabled
# Enable Spell Check
SpellCheck=True
# Enable Macro
EnableMacro=True
# Capitalize Macro
CapitalizeMacro=True
# Auto capitalize after sentence-ending punctuation (. ! ? Enter) (experimental)
AutoCapitalizeAfterPunctuation=False
# Double Space to Period (experimental)
DoubleSpaceToPeriod=False
# Double Hyphen to Em-Dash (--)
DoubleHyphenToEmDash=False
# Auto Restore Invalid Words
AutoNonVnRestore=False
# Use oà, uý (Instead Of òa, úy)
ModernStyle=True
# Allow Type With More Freedom
FreeMarking=True
# Allow dd To Produce đ When Auto Restore Invalid Words Is On
DdFreeStyle=True
# Fix Uinput Mode With Ack
FixUinputWithAck=True
# Use Lotus Status Icons
UseLotusIcons=True
# Custom Dictionary
EnableDictionary=False
# Custom Keymap
EnableCustomKeymap=False
# Show Uinput (Smooth)
ShowModeSmooth=True
# Show Uinput (Slow)
ShowModeUinput=True
# Show Uinput (Super Smooth)
ShowModeSuperSmooth=True
# Show Minecraft
ShowModeMinecraft=True
# Show Surrounding Text
ShowModeSurroundingText=True
# Show Preedit
ShowModePreedit=True
# Show Emoji Picker
ShowModeEmoji=True
# Show OFF
ShowModeOff=True
# Show Default Typing
ShowModeDefault=True
# Time Format ($TIME in macro)
TimeFormat=%H:%M
# Date Format ($DATE in macro)
DateFormat=%d/%m/%Y
# Icon Color
IconTheme=Dark

[ModeMenuKey]
0=grave

