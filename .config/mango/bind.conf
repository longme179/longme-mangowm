# reload config
bind=SUPER,r,spawn_shell,bash ~/.config/mango/scripts/config_check.sh
bind=SUPER,r,reload_config

# menu and terminal
bind=Alt,Return,spawn,kitty
# bind=Alt,space,spawn,rofi -config ~/.config/mango/rofi/config.rasi -show drun
bind=Alt,space,spawn,fuzzel

# exit super+m
# bind=SUPER,code:58,quit
bind=SUPER,m,quit
# killclient super+q
# bind=ALT,code:24,killclient,
bind=SUPER,q,killclient,

# switch window focus
# bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev
bind=SUPER,u,focuslast
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0


# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,togglejump
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=Super,w,switch_proportion_preset,
#bind=ALT,x,switch_proportion_preset,prev
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down
bind=SUPER,Tab,spawn,python3 ~/.config/mango/scripts/grid.py


#dwindle layout
bind=alt+shift,Return,dwindle_toggle_split_direction

# tile layout
bind=SUPER,e,incnmaster,1
bind=SUPER,t,incnmaster,-1
bind=ALT,s,zoom,

# switch layout
bind=CTRL+SUPER,i,setlayout,tile
bind=CTRL+SUPER,l,setlayout,scroller
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0

# Chuyển workspace bằng Super + Số
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Đưa cửa sổ sang workspace khác bằng Super + Alt + Số
bind=Super+Alt,1,tag,1,0
bind=Super+Alt,2,tag,2,0
bind=Super+Alt,3,tag,3,0
bind=Super+Alt,4,tag,4,0
bind=Super+Alt,5,tag,5,0
bind=Super+Alt,6,tag,6,0
bind=Super+Alt,7,tag,7,0
bind=Super+Alt,8,tag,8,0
bind=Super+Alt,9,tag,9,0



# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=alt+shift,Up,focusmon,up
bind=alt+shift,Down,focusmon,down
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right
bind=SUPER+Alt,Up,tagmon,up
bind=SUPER+Alt,Down,tagmon,down

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps


# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=alt,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_left,minimized
mousebind=SUPER+CTRL,btn_right,killclient
mousebind=SUPER+CTRL,btn_middle,togglefullscreen
mousebind=NONE,btn_middle,togglemaximizescreen,0

# Axis Bindings
# Super + scroll: focus cửa sổ trái/phải trong layout
axisbind=SUPER,UP,focusdir,left
axisbind=SUPER,DOWN,focusdir,right

# Shift + Super + scroll: đổi tags (workspaces) trái/phải
axisbind=SHIFT+SUPER,UP,viewtoleft,0
axisbind=SHIFT+SUPER,DOWN,viewtoright,0

# (Giữ lại Alt + scroll để focus nếu bạn vẫn muốn dùng)
# axisbind=alt,UP,focusdir,left
# axisbind=alt,DOWN,focusdir,right

# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview,1
gesturebind=none,down,4,toggleoverview,1

# brightness and volume
bind=none,XF86AudioRaiseVolume,spawn,~/.config/mango/scripts/volume.sh up
bind=none,XF86AudioLowerVolume,spawn,~/.config/mango/scripts/volume.sh down
bind=none,XF86MonBrightnessUp,spawn,~/.config/mango/scripts/brightness.sh up
bind=none,XF86MonBrightnessDown,spawn,~/.config/mango/scripts/brightness.sh down

#custom app bind
#bind=SUPER,Return,spawn,google-chrome
bind=CTRL+SUPER,Return,spawn,foot -e yazi
bind=CTRL+ALT,a,spawn_shell,grim -g "$(slurp -b '#2E2A1E55' -c '#fb751bff')" -t ppm - | satty -f -
bind=SUPER,h,spawn,bash ~/.config/mango/scripts/hide_waybar_mango.sh
bind=SUPER,l,spawn,swaylock -f -c 000000
bind=CTRL+ALT,backslash,spawn,swaync-client -t
bind=CTRL+ALT,BackSpace,spawn,swaync-client -C
bind=SUPER,p,spawn,bash ~/.config/mango/scripts/monitor.sh
bind=SUPER+SHIFT,p,spawn,bash ~/.config/mango/scripts/virmon.sh

# namescrtachpad
# bind=ctrl+super,h,toggle_named_scratchpad,st-yazi,none,st -c st-yazi -e yazi
# windowrule=isnamedscratchpad:1,width:1280,height:800,appid:st-yazi
