# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# CPU PILL - Fixed command
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
[custom.cpu]
command = "awk '{load=$1; cores=6; pct=int((load/cores)*100); if(pct>100) pct=100; print pct}' /proc/loadavg"
when = "true"
format = " [оӮ¶](fg:#00acc1)[ о°ҷ $output% ](fg:#1e1e2e bg:#00acc1)[оӮҙ](fg:#00acc1)"
shell = ["sh"]

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# TEMP PILL - Fixed command
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
[custom.temp]
command = "sensors 2>/dev/null | awk '/Tctl:/{gsub(/[+В°C]/,\"\",$2); printf \"%.0f\", $2}'"
when = "which sensors"
format = " [оӮ¶](fg:#f9a825)[ пӢӢ $outputВ°C ](fg:#1e1e2e bg:#f9a825)[оӮҙ](fg:#f9a825)"
shell = ["sh"]

# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
# BATTERY PILL
# в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
[battery]
format = " [оӮ¶](fg:$style)[ $symbol $percentage ](fg:#1e1e2e bg:$style)[оӮҙ](fg:$style)"
full_symbol = "у°Ғ№ "
charging_symbol = "у°Ӯ„ "
discharging_symbol = "у°Ӯғ "
unknown_symbol = "пүҖ "
empty_symbol = "у°ӮҺ "

[[battery.display]]
threshold = 20
style = "bold #f38ba8"

[[battery.display]]
threshold = 50
style = "#f9a825"

[[battery.display]]
threshold = 100
style = "#a6e3a1"

